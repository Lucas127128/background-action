name: Publish GitHub Action

on:
  push:
    branches: [main]

jobs:
  publish-github-action:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: pnpm i --frozen-lockfile
      - run: pnpm run build
      - name: Publish to v1 branch
        run: |
          cp -r dist /tmp/publish
          cp action.yml README.md LICENSE /tmp/publish/ 2>/dev/null || true
          git fetch origin v1 2>/dev/null || true
          git checkout --orphan v1-tmp
          git rm -rfq .
          cp -r /tmp/publish/* .
          git add -A
          git -c user.name="github-actions[bot]" \
             -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
             commit -m "chore: publish v1 [skip ci]" --allow-empty
          git push --force origin v1-tmp:v1
