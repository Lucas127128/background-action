name: 'Tests'
on:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  # unit tests
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - run: pnpm i --frozen-lockfile
      - run: pnpm test

  success:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - run: pnpm i --frozen-lockfile
      - run: pnpm build
      - uses: ./
        with:
          run: |
            PORT=1212 node test/server.js &
            PORT=2121 node test/server.js &
            PORT=3232 node test/server.js &
          wait-on: |
            http://localhost:1212/bar
            tcp:localhost:1212
            http://localhost:2121/bar
            tcp:localhost:2121
            http://localhost:3232/bar
            tcp:localhost:3232
          log-output-resume: stderr
          tail: true
          wait-for: 5m
          log-output: stderr,stdout
      - run: sleep 30 # allow stderr to get output in the background
